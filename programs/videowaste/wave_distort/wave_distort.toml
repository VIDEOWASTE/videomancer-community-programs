# Wave Distort Program Configuration

[program]
program_id = "com.videowaste.wave_distort"
program_name = "Wave Distort"
program_version = "0.0.1"
abi_version = ">=1.0,<2.0"
author = "VIDEOWASTE"
license = "GPL-3.0"
category = "Warp"
description = "Sine-wave spatial displacement with adjustable frequency, amplitude, and waveform."
url = "https://github.com/VIDEOWASTE/VIDEOMANCER-Control-Interface"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Frequency"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Amplitude"
control_mode = "linear"
display_min_value = 0
display_max_value = 32
initial_value = 256
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Speed"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Phase"
control_mode = "polar_degs_360"
display_min_value = 0
display_max_value = 360
initial_value = 0
display_float_digits = 0
suffix_label = "deg"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Waveform"
control_mode = "steps_4"
display_min_value = 0
display_max_value = 3
initial_value = 0
display_float_digits = 0
suffix_label = ""

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Direction"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Animate"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Luma Mod"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Mirror"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Unused"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Dry/Wet"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 0
suffix_label = "%"
