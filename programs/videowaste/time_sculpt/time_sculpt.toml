# Time Sculpt Program Configuration

[program]
program_id = "com.videowaste.time_sculpt"
program_name = "Time Sculpt"
program_version = "0.0.1"
abi_version = ">=1.0,<2.0"
author = "VIDEOWASTE"
license = "GPL-3.0"
category = "Temporal"
description = "Movable temporal lens: position a zone on screen where video is time-displaced by depth and luma."
url = "https://github.com/VIDEOWASTE/VIDEOMANCER-Control-Interface"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Zone X"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Zone Y"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Zone Size"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Depth"
control_mode = "linear"
display_min_value = 0
display_max_value = 1024
initial_value = 512
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Smoothing"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Luma Mod"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Invert Zone"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Square Zone"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Soft Edge"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Freeze Map"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Dry/Wet"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 0
suffix_label = "%"
