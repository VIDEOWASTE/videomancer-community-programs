# Temporal Diff Program Configuration

[program]
program_id = "com.videowaste.temporal_diff"
program_name = "Temporal Diff"
program_version = "0.0.1"
abi_version = ">=1.0,<2.0"
author = "VIDEOWASTE"
license = "GPL-3.0"
category = "Temporal"
description = "Motion detection via temporal pixel difference with threshold, colorization, and persistence."
url = "https://github.com/VIDEOWASTE/VIDEOMANCER-Control-Interface"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Delay Depth"
control_mode = "linear"
display_min_value = 0
display_max_value = 2048
initial_value = 512
display_float_digits = 0
suffix_label = "px"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Threshold"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 64
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Diff Gain"
control_mode = "linear"
display_min_value = 0
display_max_value = 200
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Colorize"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Persistence"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Unused"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = ""

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Abs Diff"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Full Color"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Invert"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Overlay"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Dry/Wet"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 0
suffix_label = "%"
