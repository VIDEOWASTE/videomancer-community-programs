# Luma Quantize Program Configuration

[program]
program_id = "com.videowaste.luma_quantize"
program_name = "Luma Quantize"
program_version = "0.0.1"
abi_version = ">=1.0,<2.0"
author = "VIDEOWASTE"
license = "GPL-3.0"
category = "Color"
description = "Maps continuous video to retro fixed color palettes (1-bit, CGA, EGA-style) with optional ordered dithering."
url = "https://github.com/VIDEOWASTE/VIDEOMANCER-Control-Interface"
hardware_compatibility = ["rev_a", "rev_b"]
core = "yuv444_30b"

[[parameter]]
parameter_id = "rotary_potentiometer_1"
name_label = "Palette"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_2"
name_label = "Brightness"
control_mode = "linear"
display_min_value = -100
display_max_value = 100
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_3"
name_label = "Saturation"
control_mode = "linear"
display_min_value = 0
display_max_value = 200
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_4"
name_label = "Dither"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 256
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_5"
name_label = "Color Shift"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 0
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "rotary_potentiometer_6"
name_label = "Contrast"
control_mode = "linear"
display_min_value = 0
display_max_value = 200
initial_value = 512
display_float_digits = 0
suffix_label = "%"

[[parameter]]
parameter_id = "toggle_switch_7"
name_label = "Dither En"
value_labels = ["Off", "On"]
initial_value_label = "On"

[[parameter]]
parameter_id = "toggle_switch_8"
name_label = "Animate"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_9"
name_label = "Hard Edges"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_10"
name_label = "Unused"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "toggle_switch_11"
name_label = "Bypass"
value_labels = ["Off", "On"]
initial_value_label = "Off"

[[parameter]]
parameter_id = "linear_potentiometer_12"
name_label = "Dry/Wet"
control_mode = "linear"
display_min_value = 0
display_max_value = 100
initial_value = 1023
display_float_digits = 0
suffix_label = "%"
